<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Match Up</title>
    <!-- 样式表 -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/grid.css">
    <link rel="stylesheet" href="css/tiles.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/props.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>2048 Match Up</h1>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">得分</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>

            <div class="style-container" style="margin-top: 20px;">
                <span style="color: #856e63; font-size: 14px; margin-right: 10px;">Style</span>
                <button class="btn-style active" onclick="switchStyle('type_01', this)">01</button>
                <button class="btn-style" onclick="switchStyle('type_02', this)">02</button>
                <button class="btn-style" onclick="switchStyle('type_03', this)">03</button>
            </div>


        </header>

        <div class="game-container">
            <div class="grid-container" id="grid"></div>

            <div class="game-over" id="game-over">
                <h2>Game End</h2>
                <button class="btn" onclick="showRestartConfirm()">New Game</button>
            </div>

            <div class="game-won" id="game-won">
                <h2>🎉 Congratulations!</h2>
                <button class="btn" onclick="continueGame()">Continue Game</button>
            </div>

            <!-- 隐藏结局弹窗（4096） -->
            <div class="game-won game-super-won" id="game-super-won">
                <h2>🏆 LEGENDARY!</h2>
                <p class="super-won-text">You have achieved the hidden ending!</p>
                <button class="btn" onclick="continueSuperGame()">Continue</button>
            </div>

            <!-- 重新开始确认弹窗 -->
            <div class="confirm-dialog" id="restart-confirm">
                <div class="confirm-content">
                    <h3>确认重新开始游戏?</h3>
                    <div class="confirm-buttons">
                        <button class="btn btn-confirm" onclick="confirmRestart()">Restart</button>
                        <button class="btn btn-cancel" onclick="cancelRestart()">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mobile-controls">
            <div class="mobile-row">
                <button class="mobile-btn" onclick="move('up')">↑</button>
            </div>
            <div class="mobile-row">
                <button class="mobile-btn" onclick="move('left')">←</button>
                <button class="mobile-btn" onclick="move('down')">↓</button>
                <button class="mobile-btn" onclick="move('right')">→</button>
            </div>
        </div>

        <!-- 道具区域 -->
        <div class="props-container">
            <div class="prop-item" id="prop-return" onclick="undoMove()" title="撤销上一步">
                <img src="Assets/props/prop_undo_disable.png" alt="撤销" id="prop-return-img" class="prop-img">
                <span class="prop-label">Undo</span>
            </div>
            <div class="prop-item" id="prop-switch" onclick="toggleSwitchMode()" title="交换两个棋子">
                <div class="prop-icon-wrapper">
                    <img src="Assets/props/prop_switch_disable.png" alt="交换" id="prop-switch-img" class="prop-img">
                    <div class="prop-count-badge" id="prop-switch-count">
                        <img src="Assets/props/prop_number_bg_default.png" alt="" class="prop-count-bg">
                        <span class="prop-count-text">2</span>
                    </div>
                </div>
                <span class="prop-label">Switch</span>
            </div>
            <div class="prop-item" id="prop-restart" onclick="showRestartConfirm()" title="重新开始游戏">
                <img src="Assets/props/prop_restart_default.png" alt="重新开始" id="prop-restart-img" class="prop-img">
                <span class="prop-label">Restart</span>
            </div>
        </div>

        <div class="instructions">
            <p><strong>玩法：</strong>使用方向键 ↑↓←→ 或滑动屏幕移动方块</p>
            <p>相同数字的方块相撞时会合并，目标是得到 2048！</p>
        </div>

        <!-- Toast 提示 -->
        <div id="toast" class="toast">依次点击两个不同的棋子进行交换</div>
    </div>

    <!-- JavaScript 模块 -->
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/board.js"></script>
    <script src="js/game.js"></script>
    <script src="js/props/undo.js"></script>
    <script src="js/props/switch.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
