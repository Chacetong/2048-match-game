<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TileFuse</title>
    <!-- 样式表 -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/grid.css">
    <link rel="stylesheet" href="css/tiles.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/props.css">
</head>

<body>
    <!-- 启动页 -->
    <div id="start-page" class="start-page">
        <div class="start-content">
            <img src="Assets/text-logo.png" alt="TileFuse" class="start-logo">
            <p class="start-subtitle">Select difficulty to start the game</p>
            <div class="difficulty-buttons">
                <button class="btn-difficulty btn-easy" onclick="startGame('Easy')">
                    <span class="recommend-tag">Recommend</span>
                    <span class="difficulty-name">Easy</span>
                    <span class="difficulty-size">5 × 5</span>
                </button>
                <button class="btn-difficulty btn-normal" onclick="startGame('Normal')">
                    <span class="difficulty-name">Normal</span>
                    <span class="difficulty-size">4 × 4</span>
                </button>
                <button class="btn-difficulty btn-hard" onclick="startGame('Hard')">
                    <span class="difficulty-name">Hard</span>
                    <span class="difficulty-size">3 × 3</span>
                </button>
            </div>
        </div>
        <div class="start-version">
            <span class="version-text">v2.0.1</span>
            <span class="update-time">2026/03/12 04:40</span>
        </div>
    </div>

    <!-- 游戏页 -->
    <div id="game-page" class="game-page hidden">
        <div class="container">
            <header>
                <div class="header-top">
                    <div class="score-container">
                        <div class="score-box">
                            <div class="score-label">Score</div>
                            <div class="score-value" id="score">0</div>
                        </div>
                        <div class="score-box">
                            <div class="score-label">Best Score</div>
                            <div class="score-value" id="best-score">0</div>
                        </div>
                    </div>
                    <div class="setting-btn" id="setting-btn" onclick="showRestartConfirm()" title="Setting">
                        <img src="Assets/setting.png" alt="Setting" class="setting-icon">
                    </div>
                </div>

            </header>

            <!-- 棋子展示模块 -->
            <div class="tile-showcase" id="tile-showcase">
                <div class="showcase-tiles" id="showcase-tiles">
                    <!-- 棋子切图将通过 JS 动态生成 -->
                </div>
            </div>

            <div class="game-container">
                <div class="grid-container" id="grid"></div>

                <div class="game-over" id="game-over">
                    <h2>Game End</h2>
                    <button class="btn" onclick="newGame()">New Game</button>
                </div>

                <div class="game-won" id="game-won">
                    <h2>🎉</h2>
                    <h2>Cycle Complete!</h2>
                    <p>有两把刷子</p>
                    <button class="btn" onclick="continueCycle()">Continue</button>
                </div>

                <div class="game-won game-super-won" id="game-super-won">
                    <h2>🏆</h2>
                    <h2>LEGENDARY!</h2>
                    <p class="super-won-text">完成所有 Cycle - 传奇成就!</p>
                    <button class="btn" onclick="newGame()">New Game</button>
                </div>

            </div>

            <!-- Settings 弹窗 - 覆盖整个界面 -->
            <div class="confirm-dialog" id="restart-confirm">
                <div class="confirm-content">
                    <h2 class="dialog-title">Settings</h2>
                    <div class="style-container">
                        <div class="style-group">
                            <span class="style-label">Plate</span>
                            <div class="style-switch" id="plate-switch">
                                <div class="switch-slider"></div>
                                <button class="switch-btn active" data-value="theme-01"
                                    onclick="switchStyle('theme-01', this)">01</button>
                                <button class="switch-btn" data-value="theme-02"
                                    onclick="switchStyle('theme-02', this)">02</button>
                                <button class="switch-btn" data-value="theme-03"
                                    onclick="switchStyle('theme-03', this)">03</button>
                            </div>
                        </div>
                    </div>
                    <div class="confirm-buttons">
                        <button class="btn btn-confirm" onclick="confirmRestart()">Restart</button>
                        <button class="btn btn-quit" onclick="quitToMenu()">Quit</button>
                        <button class="btn btn-cancel" onclick="cancelRestart()">OK</button>
                    </div>
                </div>
            </div>

            <div class="props-container">
                <div class="prop-item" id="prop-return" onclick="undoMove()" title="撤销上一步">
                    <img src="Assets/props/undo-disabled.png" alt="撤销" id="prop-return-img" class="prop-img">
                    <span class="prop-label">Undo</span>
                </div>
                <div class="prop-item" id="prop-switch" onclick="toggleSwitchMode()" title="交换两个棋子">
                    <div class="prop-icon-wrapper">
                        <img src="Assets/props/switch-disabled.png" alt="交换" id="prop-switch-img" class="prop-img">
                        <div class="prop-count-badge" id="prop-switch-count">
                            <img src="Assets/props/badge-active.png" alt="" class="prop-count-bg">
                            <span class="prop-count-text">2</span>
                        </div>
                    </div>
                    <span class="prop-label">Switch</span>
                </div>
                <div class="prop-item" id="prop-upgrade" onclick="toggleUpgradeMode()" title="提升一个非最高等级棋子">
                    <div class="prop-icon-wrapper">
                        <img src="Assets/props/upgrade-active.png" alt="升级" id="prop-upgrade-img" class="prop-img">
                        <div class="prop-count-badge" id="prop-upgrade-count">
                            <img src="Assets/props/badge-active.png" alt="" class="prop-count-bg">
                            <span class="prop-count-text">2</span>
                        </div>
                    </div>
                    <span class="prop-label">Upgrade</span>
                </div>
            </div>

            <div class="mobile-controls">
                <button class="mobile-btn" onclick="move('left')">←</button>
                <div class="mobile-col-middle">
                    <button class="mobile-btn" onclick="move('up')">↑</button>
                    <button class="mobile-btn" onclick="move('down')">↓</button>
                </div>
                <button class="mobile-btn" onclick="move('right')">→</button>
            </div>


            <div class="instructions">
                <p class="instruction-pc"><strong>玩法：</strong>使用方向键 ↑↓←→ 移动</p>
                <p class="instruction-mobile"><strong>玩法：</strong>在棋盘内滑动移动</p>
            </div>

            <div id="toast" class="toast">点击两个不同棋子进行交换</div>
        </div>
    </div>

    <!-- JavaScript 模块 -->
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/level-utils.js"></script>
    <script src="js/spawn-logic.js"></script>
    <script src="js/preload.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/board.js"></script>
    <script src="js/game.js"></script>
    <script src="js/props/undo.js"></script>
    <script src="js/props/switch.js"></script>
    <script src="js/props/upgrade.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
